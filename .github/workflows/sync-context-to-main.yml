name: Merge session work to main

on:
  push:
    branches: ['claude/**']

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.ref_name }}
          # Merge the full branch (all code + context), not just context files
          git merge origin/${{ github.ref_name }} --no-ff -m "Auto-merge from ${{ github.ref_name }}" || {
            echo "Merge conflict — falling back to context-only sync"
            git merge --abort
            git checkout origin/${{ github.ref_name }} -- CLAUDE.md docs/session-log.md .claude/rules/ .claude/skills/ .github/workflows/ 2>/dev/null || true
            git add CLAUDE.md docs/session-log.md .claude/rules/ .claude/skills/ .github/workflows/
            if git diff --staged --quiet; then
              echo "No changes to sync"
              exit 0
            fi
            git commit -m "Auto-sync context from ${{ github.ref_name }} (merge had conflicts)"
          }
          git push origin main
