name: Merge session work to main

on:
  push:
    branches: ['claude/**']

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ github.ref_name }}

          # Try clean merge first
          if git merge origin/${{ github.ref_name }} --no-ff -m "Auto-merge from ${{ github.ref_name }}"; then
            echo "Clean merge successful"
          else
            # On conflict, prefer the feature branch version (it has the latest work)
            git merge --abort
            git merge origin/${{ github.ref_name }} --no-ff -X theirs -m "Auto-merge from ${{ github.ref_name }}" || {
              # Last resort: copy all files from branch
              echo "Strategy merge failed — doing full file sync"
              git merge --abort 2>/dev/null || true
              git checkout origin/${{ github.ref_name }} -- . 2>/dev/null || true
              git add -A
              if git diff --staged --quiet; then
                echo "No changes to sync"
                exit 0
              fi
              git commit -m "Auto-sync all files from ${{ github.ref_name }}"
            }
          fi
          git push origin main
