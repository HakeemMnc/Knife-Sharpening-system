name: Sync session context to main

on:
  push:
    branches: ['claude/**']
    paths:
      - 'CLAUDE.md'
      - 'docs/session-log.md'
      - '.claude/rules/**'
      - '.claude/skills/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy context files from source branch
        run: |
          git fetch origin ${{ github.ref_name }}
          git checkout origin/${{ github.ref_name }} -- CLAUDE.md docs/session-log.md .claude/rules/ .claude/skills/ 2>/dev/null || true

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md docs/session-log.md .claude/rules/ .claude/skills/
          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "Auto-sync session context from ${{ github.ref_name }}"
          git push origin main
